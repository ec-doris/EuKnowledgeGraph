name: Build

on:
  workflow_call:
    inputs:
      AWS_REGION:
        description: 'AWS region'
        type: string
        required: true
      ECR_REPOSITORY:
        description: 'ECR repository'
        type: string
        required: true
      IMAGE_TAG:
        description: 'Image tag'
        type: string
        required: true
      DOCKERFILE:
        description: 'Dockerfile path'
        type: string
        required: false
        default: './Dockerfile'
      CONTEXT:
        description: 'Path context'
        type: string
        required: false
        default: '.'
      ROLE_TO_ASSUME:
        description: 'Role to assume'
        type: string
        required: false
        default: ''
      GITHUB_TOKEN:
        description: "Github token to checkout the repo. Use it only if its a different repo than where the workflow is running"
        type: string
        required: false
        default: ''
      CHECKOUT_SUBMODULES:
        description: "Checkout actions submodule parameter"
        type: boolean
        required: false
        default: false
      BUILD_ARGS:
          description: "Build args parameter"
          type: string
          required: false
          default: ''
  workflow_dispatch:
      inputs:
        AWS_REGION:
          description: 'AWS region'
          type: string
          required: true
        ECR_REPOSITORY:
          description: 'ECR repository'
          type: string
          required: true
        IMAGE_TAG:
          description: 'Image tag'
          type: string
          required: true
        DOCKERFILE:
          description: 'Dockerfile path'
          type: string
          required: false
          default: './Dockerfile'
        CONTEXT:
          description: 'Path context'
          type: string
          required: false
          default: '.'
        ROLE_TO_ASSUME:
          description: 'Role to assume'
          type: string
          required: false
          default: ''
        GITHUB_TOKEN:
          description: "Github token to checkout the repo. Use it only if its a different repo than where the workflow is running"
          type: string
          required: false
          default: ''
        CHECKOUT_SUBMODULES:
          description: "Checkout actions submodule parameter"
          type: boolean
          required: false
          default: false
        BUILD_ARGS:
          description: "Build args parameter"
          type: string
          required: false
          default: ''
jobs:
  build:
    runs-on: doris-runners-dev
    steps:
      - name: Install git
        run: sudo apt-get update && sudo apt-get install -y git jq wget curl unzip
        
      - name: Checkout
        uses: actions/checkout@master
        with:
         token: ${{ inputs.token != '' && inputs.token || github.token }}
         submodules: ${{ inputs.CHECKOUT_SUBMODULES }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        if: inputs.ROLE_TO_ASSUME == ''
        with:
          aws-region: ${{ inputs.AWS_REGION }}

      - name: Configure AWS credentials with Assume Role
        uses: aws-actions/configure-aws-credentials@v4
        if: inputs.ROLE_TO_ASSUME != ''
        with:
          aws-region: ${{ inputs.AWS_REGION }}
          role-to-assume: ${{ inputs.ROLE_TO_ASSUME }}
          role-skip-session-tagging: true

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest # https://github.com/docker/build-push-action/issues/1035

      - name: Create and use a new builder instance
        run: |
          docker buildx create --name mybuilder --use

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.CONTEXT }}
          file: ${{ inputs.DOCKERFILE }}
          push: true
          tags: ${{ inputs.ECR_REPOSITORY}}:${{ inputs.IMAGE_TAG }}
          builder: mybuilder
          cache-from: type=registry,ref=${{ inputs.ECR_REPOSITORY }}:cache
          cache-to: type=registry,mode=max,image-manifest=true,oci-mediatypes=true,ref=${{ inputs.ECR_REPOSITORY }}:cache
          provenance: false # https://github.com/aws/containers-roadmap/issues/1596
          build-args: ${{ inputs.BUILD_ARGS }}
